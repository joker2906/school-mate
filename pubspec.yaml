name: school_management_system
description: A new Flutter project.
publish_to: none
version: 1.0.0+1
environment:
  sdk: '>=2.16.1 <4.0.0'
dependencies:
  cloud_firestore:
    path: packages/cloud_firestore
  cupertino_icons: ^1.0.2
  custom_navigation_bar: ^0.8.2
  dio: ^5.9.2
  file_picker: ^10.3.10
  firebase_auth:
    path: packages/firebase_auth
  firebase_messaging:
    path: packages/firebase_messaging
  firebase_storage:
    path: packages/firebase_storage
  firebase_core:
    path: packages/firebase_core
  flutter:
    sdk: flutter
  flutter_downloader: ^1.7.0
  flutter_easyloading: ^3.0.5
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^21.0.0
  flutter_phoenix: ^1.0.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  flutter_zoom_drawer: ^3.0.2
  get: ^4.6.6
  get_storage: ^2.0.3
  google_fonts: ^8.0.2
  # google_sign_in: ^7.2.0
  image_picker: ^1.0.0
  intl: ^0.20.2
  open_file: ^3.2.1
  path_provider: ^2.0.11
  permission_handler: ^12.0.1
  rounded_loading_button: ^2.1.0
  shimmer: ^3.0.0
  table_calendar: ^3.0.6
  url_launcher: ^6.1.4
  youtube_player_flutter: ^9.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  file: ^7.0.0
  flutter_plugin_android_lifecycle: ^2.0.17

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/LOGO2.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: RedHatDisplay-Bold
      fonts:
        - asset: assets/fonts/RedHatDisplay-Bold.ttf
    - family: RedHatDisplay-Light
      fonts:
        - asset: assets/fonts/RedHatDisplay-Light.ttf
    - family: RedHatDisplay-Medium
      fonts:
        - asset: assets/fonts/RedHatDisplay-Medium.ttf
    - family: RedHatDisplay-Regular
      fonts:
        - asset: assets/fonts/RedHatDisplay-Regular.ttf
    - family: SFProDisplay-Bold
      fonts:
        - asset: assets/fonts/SFProDisplay-Bold.OTF
    - family: SFProDisplay-Medium
      fonts:
        - asset: assets/fonts/SFProDisplay-Medium.OTF
    - family: SFProDisplay-Regular
      fonts:
        - asset: assets/fonts/SFProDisplay-Regular.OTF

# To add assets to your application, add an assets section, like this:
# assets:
#  - images/a_dot_burr.jpeg
#  - images/a_dot_ham.jpeg
# An image asset can refer to one or more resolution-specific "variants", see
# https://flutter.dev/assets-and-images/#resolution-aware.
# For details regarding adding assets from package dependencies, see
# https://flutter.dev/assets-and-images/#from-packages
# To add custom fonts to your application, add a fonts section here,
# in this "flutter" section. Each entry in this list should have a
# "family" key with the font family name, and a "fonts" key with a
# list giving the asset and other descriptors for the font. For
# example:
# fonts:
#   - family: Schyler
#     fonts:
#       - asset: fonts/Schyler-Regular.ttf
#       - asset: fonts/Schyler-Italic.ttf
#         style: italic
#   - family: Trajan Pro
